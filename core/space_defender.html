<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Defender - HTML5 Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .game-container {
            position: relative;
            border: 3px solid #4ecca3;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(78, 204, 163, 0.5);
        }

        canvas {
            display: block;
            background: linear-gradient(180deg, #0f0f23 0%, #1a1a3e 100%);
        }

        .ui-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            color: #4ecca3;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            pointer-events: none;
        }

        .start-screen, .game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(15, 15, 35, 0.95);
            color: #4ecca3;
            z-index: 10;
        }

        .game-over-screen {
            display: none;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #4ecca3;
        }

        h2 {
            font-size: 36px;
            margin-bottom: 20px;
        }

        p {
            font-size: 18px;
            margin-bottom: 30px;
            text-align: center;
            line-height: 1.6;
        }

        button {
            padding: 15px 40px;
            font-size: 20px;
            background: #4ecca3;
            color: #1a1a2e;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(78, 204, 163, 0.4);
        }

        button:hover {
            background: #3db892;
            transform: translateY(-2px);
            box-shadow: 0 7px 20px rgba(78, 204, 163, 0.6);
        }

        .controls {
            margin-top: 30px;
            font-size: 14px;
            color: #888;
        }

        .health-bar {
            width: 200px;
            height: 20px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #4ecca3;
        }

        .health-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff4757, #4ecca3);
            transition: width 0.3s ease;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <div class="ui-overlay">
            <div>Score: <span id="score">0</span></div>
            <div class="health-bar">
                <div class="health-fill" id="healthFill"></div>
            </div>
        </div>

        <div class="start-screen" id="startScreen">
            <h1>🚀 Space Defender</h1>
            <p>Defend Earth from alien invaders!<br>Destroy enemies and survive as long as possible.</p>
            <button id="startBtn">Start Game</button>
            <div class="controls">
                <p>⬅️ ➡️ Arrow Keys or A/D to move<br>SPACE to shoot</p>
            </div>
        </div>

        <div class="game-over-screen" id="gameOverScreen">
            <h2>Game Over</h2>
            <p>Final Score: <span id="finalScore">0</span></p>
            <button id="restartBtn">Play Again</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const finalScoreElement = document.getElementById('finalScore');
        const healthFill = document.getElementById('healthFill');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');

        // Game state
        let gameRunning = false;
        let score = 0;
        let playerHealth = 100;
        let animationId;

        // Player
        const player = {
            x: canvas.width / 2,
            y: canvas.height - 60,
            width: 50,
            height: 40,
            speed: 7,
            dx: 0
        };

        // Arrays for game objects
        let bullets = [];
        let enemies = [];
        let particles = [];
        let stars = [];

        // Initialize stars
        function initStars() {
            stars = [];
            for (let i = 0; i < 100; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 0.5,
                    speed: Math.random() * 2 + 0.5
                });
            }
        }

        // Draw stars
        function drawStars() {
            ctx.fillStyle = '#ffffff';
            stars.forEach(star => {
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
                star.y += star.speed;
                if (star.y > canvas.height) {
                    star.y = 0;
                    star.x = Math.random() * canvas.width;
                }
            });
        }

        // Draw player
        function drawPlayer() {
            // Ship body
            ctx.fillStyle = '#4ecca3';
            ctx.beginPath();
            ctx.moveTo(player.x, player.y);
            ctx.lineTo(player.x - player.width / 2, player.y + player.height);
            ctx.lineTo(player.x + player.width / 2, player.y + player.height);
            ctx.closePath();
            ctx.fill();

            // Cockpit
            ctx.fillStyle = '#23a89a';
            ctx.beginPath();
            ctx.arc(player.x, player.y + 15, 8, 0, Math.PI * 2);
            ctx.fill();

            // Engine flame
            ctx.fillStyle = '#ff6b35';
            ctx.beginPath();
            ctx.moveTo(player.x - 10, player.y + player.height);
            ctx.lineTo(player.x, player.y + player.height + 15 + Math.random() * 10);
            ctx.lineTo(player.x + 10, player.y + player.height);
            ctx.closePath();
            ctx.fill();
        }

        // Draw bullet
        function drawBullet(bullet) {
            ctx.fillStyle = '#ffd93d';
            ctx.fillRect(bullet.x - 3, bullet.y, 6, 15);
            
            // Glow effect
            ctx.shadowColor = '#ffd93d';
            ctx.shadowBlur = 10;
            ctx.fillRect(bullet.x - 2, bullet.y, 4, 12);
            ctx.shadowBlur = 0;
        }

        // Draw enemy
        function drawEnemy(enemy) {
            // Enemy body
            ctx.fillStyle = enemy.color;
            ctx.beginPath();
            ctx.moveTo(enemy.x, enemy.y + enemy.height);
            ctx.lineTo(enemy.x - enemy.width / 2, enemy.y);
            ctx.lineTo(enemy.x + enemy.width / 2, enemy.y);
            ctx.closePath();
            ctx.fill();

            // Eyes
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(enemy.x - 10, enemy.y + 15, 5, 0, Math.PI * 2);
            ctx.arc(enemy.x + 10, enemy.y + 15, 5, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(enemy.x - 10, enemy.y + 15, 2, 0, Math.PI * 2);
            ctx.arc(enemy.x + 10, enemy.y + 15, 2, 0, Math.PI * 2);
            ctx.fill();
        }

        // Create particle explosion
        function createExplosion(x, y, color) {
            for (let i = 0; i < 15; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 1,
                    color: color,
                    size: Math.random() * 4 + 2
                });
            }
        }

        // Draw particles
        function drawParticles() {
            particles.forEach((particle, index) => {
                ctx.globalAlpha = particle.life;
                ctx.fillStyle = particle.color;
                ctx.beginPath();
                ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;

                particle.x += particle.vx;
                particle.y += particle.vy;
                particle.life -= 0.03;

                if (particle.life <= 0) {
                    particles.splice(index, 1);
                }
            });
        }

        // Spawn enemy
        function spawnEnemy() {
            const colors = ['#ff6b6b', '#feca57', '#ff9ff3', '#54a0ff'];
            const enemy = {
                x: Math.random() * (canvas.width - 60) + 30,
                y: -50,
                width: 50,
                height: 40,
                speed: Math.random() * 2 + 2,
                color: colors[Math.floor(Math.random() * colors.length)]
            };
            enemies.push(enemy);
        }

        // Update game state
        function update() {
            // Move player
            player.x += player.dx;
            if (player.x < player.width / 2) player.x = player.width / 2;
            if (player.x > canvas.width - player.width / 2) player.x = canvas.width - player.width / 2;

            // Move bullets
            bullets.forEach((bullet, index) => {
                bullet.y -= 10;
                if (bullet.y < 0) {
                    bullets.splice(index, 1);
                }
            });

            // Move enemies
            enemies.forEach((enemy, eIndex) => {
                enemy.y += enemy.speed;

                // Check collision with player
                if (
                    player.x - player.width / 2 < enemy.x + enemy.width / 2 &&
                    player.x + player.width / 2 > enemy.x - enemy.width / 2 &&
                    player.y < enemy.y + enemy.height &&
                    player.y + player.height > enemy.y
                ) {
                    enemies.splice(eIndex, 1);
                    createExplosion(enemy.x, enemy.y, enemy.color);
                    playerHealth -= 20;
                    healthFill.style.width = playerHealth + '%';
                    
                    if (playerHealth <= 0) {
                        gameOver();
                    }
                }

                // Check collision with bullets
                bullets.forEach((bullet, bIndex) => {
                    if (
                        bullet.x > enemy.x - enemy.width / 2 &&
                        bullet.x < enemy.x + enemy.width / 2 &&
                        bullet.y > enemy.y &&
                        bullet.y < enemy.y + enemy.height
                    ) {
                        enemies.splice(eIndex, 1);
                        bullets.splice(bIndex, 1);
                        createExplosion(enemy.x, enemy.y, enemy.color);
                        score += 100;
                        scoreElement.textContent = score;
                    }
                });

                // Remove enemies that go off screen
                if (enemy.y > canvas.height) {
                    enemies.splice(eIndex, 1);
                }
            });

            // Spawn enemies periodically
            if (Math.random() < 0.02 + score / 100000) {
                spawnEnemy();
            }
        }

        // Draw everything
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            drawStars();
            drawPlayer();
            
            bullets.forEach(drawBullet);
            enemies.forEach(drawEnemy);
            drawParticles();
        }

        // Game loop
        function gameLoop() {
            if (!gameRunning) return;
            
            update();
            draw();
            animationId = requestAnimationFrame(gameLoop);
        }

        // Start game
        function startGame() {
            gameRunning = true;
            score = 0;
            playerHealth = 100;
            player.x = canvas.width / 2;
            bullets = [];
            enemies = [];
            particles = [];
            
            scoreElement.textContent = score;
            healthFill.style.width = playerHealth + '%';
            
            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
            
            initStars();
            gameLoop();
        }

        // Game over
        function gameOver() {
            gameRunning = false;
            cancelAnimationFrame(animationId);
            finalScoreElement.textContent = score;
            gameOverScreen.style.display = 'flex';
        }

        // Event listeners
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
                player.dx = -player.speed;
            }
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
                player.dx = player.speed;
            }
            if (e.key === ' ' && gameRunning) {
                bullets.push({
                    x: player.x,
                    y: player.y
                });
            }
        });

        document.addEventListener('keyup', (e) => {
            if (
                e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A' ||
                e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D'
            ) {
                player.dx = 0;
            }
        });

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

        // Initialize
        initStars();
        drawStars();
        drawPlayer();
    </script>
</body>
</html>
